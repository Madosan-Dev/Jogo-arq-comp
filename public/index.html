<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Arq Comp</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <main>
        <section class="box_quiz">

            <div id="box" style="display: none">
                    <div>
                        <p id="num_pergunta"></p>
                        <p id="p_timer"></p>
                        <p id="pontuacao"></p>
                    </div>
                <h2 id="quiz_pergunta"></h2>
                <div id="perguntas">
                </div>
                <button onclick="reiniciar()">Reiniciar Quiz</button>
            </div>
            <div id="box_inicio" >
                <h2 id="quiz_pergunta">Quiz de Arquitetura Computacional</h2>
                <button onclick="iniciarQuiz()">Iniciar Quiz</button>
            </div>
        </section>
        <div id="tela-overlay" class="tela-escura" style="display: none;">
            <div class="erro-menu">
                <img src="assets/imgs/relogio.png" alt="">
                <p>Tempo Esgotado!</p>
                <p id="pontuacao_esgotado"></p>
            </div>
        </div>
        <div id="tela-overlay-final" class="tela-escura" style="display: none;">
            <div class="erro-menu final">
                <p id="msg_final"></p>
                <p id="pontuacao_final"></p>
                <button onclick="fecharMenu()">Fechar</button>
            </div>
        </div>
    </main>
</body>
</html>
<script src="./js/dados.js"></script>
<script src="./js/quiz.js"></script>
